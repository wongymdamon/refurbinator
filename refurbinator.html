<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新世紀復修戰士 - 完整管理版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        [v-cloak] { display: none; }
        .lucide { display: inline-block; vertical-align: middle; }
        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        
        // 防禦性 Icon 組件
        const Icon = ({ name, size = 24, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const iconNode = lucide.icons[name] || lucide.icons.HelpCircle;
                    if (iconNode && Array.isArray(iconNode)) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        const rootAttrs = iconNode[1] || {};
                        const attrs = { 
                            ...rootAttrs, 
                            width: size, 
                            height: size, 
                            class: `lucide lucide-${name.toLowerCase()} ${className}` 
                        };
                        Object.entries(attrs).forEach(([key, value]) => {
                            if (value !== undefined && value !== null) svg.setAttribute(key, value);
                        });
                        const children = iconNode[2];
                        if (children && Array.isArray(children)) {
                            children.forEach((child) => {
                                if (!child || !Array.isArray(child)) return;
                                const tagName = child[0];
                                const tagAttrs = child[1];
                                if (tagName && typeof tagName === 'string') {
                                    const element = document.createElementNS("http://www.w3.org/2000/svg", tagName);
                                    if (tagAttrs && typeof tagAttrs === 'object') {
                                        Object.entries(tagAttrs).forEach(([key, value]) => {
                                            if (value !== undefined && value !== null) element.setAttribute(key, value);
                                        });
                                    }
                                    svg.appendChild(element);
                                }
                            });
                        }
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center"></span>;
        };

        const initialRecords = [
            { id: 1, name: "陳大文", org: "明愛社區中心", content: "回收及拆解舊電腦", datetime: "2026-04-18T09:00", duration: 4, rating: 4 },
            { id: 2, name: "李小明", org: "青蔥學院", content: "安裝 Windows 10 及基本軟件", datetime: "2026-04-18T10:00", duration: 3, rating: 5 },
            { id: 3, name: "張美玲", org: "明愛社區中心", content: "測試硬碟及 RAM 健康狀態", datetime: "2026-04-19T14:00", duration: 2.5, rating: 4 }
        ];

        const initialUsers = [
            { username: 'admin', password: 'admin123', org: '指揮部', role: 'admin', status: 'approved' },
            { username: 'intern_01', password: '123', org: '明愛社區中心', role: 'user', status: 'approved' },
            { username: 'recruit_99', password: '456', org: '青蔥學院', role: 'user', status: 'pending' }
        ];

        function App() {
            const [records, setRecords] = useState(initialRecords);
            const [users, setUsers] = useState(initialUsers);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentUser, setCurrentUser] = useState(null);
            
            // Auth 狀態
            const [isRegisterMode, setIsRegisterMode] = useState(false);
            const [authForm, setAuthForm] = useState({ username: '', password: '', org: '' });
            const [authError, setAuthError] = useState('');
            const [regSuccess, setRegSuccess] = useState(false);

            // 表單數據
            const [formData, setFormData] = useState({ content: '', datetime: '', duration: '', rating: '5' });
            const [editingRecord, setEditingRecord] = useState(null);

            const handleAuthChange = (e) => setAuthForm({ ...authForm, [e.target.name]: e.target.value });
            const handleInputChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleLogin = (e) => {
                if (e) e.preventDefault();
                const user = users.find(u => u.username === authForm.username && u.password === authForm.password);
                if (user) {
                    if (user.status === 'pending') {
                        setAuthError('資格審核中，請聯繫指揮部批准。');
                        return;
                    }
                    setCurrentUser(user);
                    setAuthError('');
                } else {
                    setAuthError('登入失敗，請檢查代號或密鑰');
                }
            };

            const handleRegister = (e) => {
                e.preventDefault();
                if (users.some(u => u.username === authForm.username)) {
                    setAuthError('此代號已被佔用');
                    return;
                }
                const newUser = {
                    username: authForm.username,
                    password: authForm.password,
                    org: authForm.org || '未分配',
                    role: 'user',
                    status: 'pending'
                };
                setUsers([...users, newUser]);
                setRegSuccess(true);
                setAuthError('');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingRecord) {
                    setRecords(records.map(r => r.id === editingRecord.id ? { ...r, ...formData, duration: parseFloat(formData.duration), rating: parseInt(formData.rating) } : r));
                    setEditingRecord(null);
                } else {
                    setRecords([{ id: Date.now(), name: currentUser.username, org: currentUser.org, ...formData, duration: parseFloat(formData.duration), rating: parseInt(formData.rating) }, ...records]);
                }
                setFormData({ content: '', datetime: '', duration: '', rating: '5' });
                setActiveTab('history');
            };

            const updateUserStatus = (username, newStatus) => {
                setUsers(users.map(u => u.username === username ? { ...u, status: newStatus } : u));
            };

            const leaderboard = useMemo(() => {
                const stats = {};
                records.forEach(r => {
                    if (!stats[r.name]) stats[r.name] = { name: r.name, org: r.org, totalHours: 0, totalRating: 0, count: 0 };
                    stats[r.name].totalHours += r.duration;
                    stats[r.name].totalRating += r.rating;
                    stats[r.name].count += 1;
                });
                return Object.values(stats).map(s => ({
                    ...s,
                    score: ((s.totalHours * (s.totalRating / (s.count || 1))) / 2).toFixed(1)
                })).sort((a, b) => b.score - a.score);
            }, [records]);

            const inputClass = "w-full p-4 bg-slate-50 dark:bg-black border border-slate-200 dark:border-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all text-slate-900 dark:text-white placeholder:text-slate-400";
            const yellowInputClass = "w-full p-5 bg-slate-50 dark:bg-black border border-slate-200 dark:border-slate-800 rounded-3xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-slate-900 dark:text-amber-400 font-bold font-mono";

            if (!currentUser) {
                return (
                    <div className={isDarkMode ? 'dark' : ''}>
                        <div className="min-h-screen bg-slate-100 dark:bg-black flex items-center justify-center p-4">
                            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 dark:border-indigo-500/30">
                                <div className="p-10 bg-indigo-600 text-white text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                                        <div className="absolute top-[-50%] left-[-50%] w-[200%] h-[200%] border-[20px] border-white rounded-full animate-pulse"></div>
                                    </div>
                                    <h1 className="text-3xl font-black tracking-widest mb-1 relative z-10">新世紀復修戰士</h1>
                                    <p className="font-orbitron text-indigo-300 text-[10px] tracking-[0.3em] uppercase relative z-10">Refurbinator Unit</p>
                                </div>
                                <div className="p-8">
                                    {regSuccess ? (
                                        <div className="py-12 text-center space-y-6 animate-in zoom-in duration-300">
                                            <div className="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto">
                                                <Icon name="ShieldCheck" size={32} />
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-black dark:text-white">註冊申請已提交</h2>
                                                <p className="text-sm text-slate-500 px-4 mt-2">請等待指揮部審核您的戰士資格。審核通過後即可登入。</p>
                                            </div>
                                            <button 
                                                onClick={() => {setRegSuccess(false); setIsRegisterMode(false);}} 
                                                className="w-full py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl font-black text-xs tracking-widest hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2"
                                            >
                                                <Icon name="ArrowLeft" size={14} />
                                                返回登入界面 / BACK TO LOGIN
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex mb-8 bg-slate-100 dark:bg-slate-800 p-1 rounded-2xl">
                                                <button onClick={() => {setIsRegisterMode(false); setAuthError('')}} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${!isRegisterMode ? 'bg-white dark:bg-slate-700 shadow-sm dark:text-white' : 'text-slate-400'}`}>
                                                    登入 / LOGIN
                                                </button>
                                                <button onClick={() => {setIsRegisterMode(true); setAuthError('')}} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${isRegisterMode ? 'bg-white dark:bg-slate-700 shadow-sm dark:text-white' : 'text-slate-400'}`}>
                                                    註冊 / JOIN US
                                                </button>
                                            </div>

                                            <form onSubmit={isRegisterMode ? handleRegister : handleLogin} className="space-y-4">
                                                <div className="space-y-4">
                                                    <div className="relative">
                                                        <Icon name="User" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                                        <input name="username" required className={`${inputClass} pl-12`} placeholder="ID: 特工代號" value={authForm.username} onChange={handleAuthChange} />
                                                    </div>
                                                    <div className="relative">
                                                        <Icon name="Key" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                                        <input name="password" type="password" required className={`${inputClass} pl-12`} placeholder="KEY: 安全密鑰" value={authForm.password} onChange={handleAuthChange} />
                                                    </div>
                                                    {isRegisterMode && (
                                                        <div className="relative animate-in slide-in-from-top-2 duration-300">
                                                            <Icon name="Building" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                                            <input name="org" required className={`${inputClass} pl-12`} placeholder="ORG: 所屬組織" value={authForm.org} onChange={handleAuthChange} />
                                                        </div>
                                                    )}
                                                </div>

                                                {authError && (
                                                    <div className="space-y-3">
                                                        <div className="text-red-500 text-[10px] text-center font-bold uppercase tracking-widest bg-red-50 dark:bg-red-900/20 py-3 rounded-xl border border-red-100 dark:border-red-900/30">
                                                            {authError}
                                                        </div>
                                                        {authError.includes('審核中') && (
                                                            <button 
                                                                type="button"
                                                                onClick={() => {setAuthForm({username:'', password:'', org:''}); setAuthError('');}}
                                                                className="w-full text-[10px] text-indigo-500 font-bold uppercase tracking-widest hover:underline"
                                                            >
                                                                嘗試其他帳號 / TRY ANOTHER ID
                                                            </button>
                                                        )}
                                                    </div>
                                                )}

                                                <button type="submit" className={`w-full py-5 rounded-2xl font-black font-orbitron tracking-widest shadow-xl transition-all hover:scale-[1.02] active:scale-[0.98] ${isRegisterMode ? 'bg-amber-500 text-black hover:bg-amber-600' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                                    {isRegisterMode ? 'RECRUIT ME' : 'START MISSION'}
                                                </button>
                                            </form>
                                        </>
                                    )}
                                    <div className="mt-8 text-center">
                                        <p className="text-[10px] text-slate-400 uppercase tracking-[0.2em] font-bold">Standard Operations Environment v2.5</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={isDarkMode ? 'dark' : ''}>
                    <div className="min-h-screen bg-slate-50 dark:bg-black text-slate-800 dark:text-slate-300 transition-colors pb-20 sm:pb-0">
                        {/* 頂部導覽列 */}
                        <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-indigo-500/20 sticky top-0 z-50">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <Icon name="Cpu" className="text-indigo-600" />
                                    <div className="hidden xs:block">
                                        <div className="font-black text-sm sm:text-lg dark:text-white uppercase tracking-tighter leading-tight">新世紀復修戰士</div>
                                        <div className="font-orbitron text-[8px] sm:text-[9px] text-indigo-500 font-bold tracking-[0.2em] leading-none uppercase">REFURBINATOR</div>
                                    </div>
                                </div>
                                
                                <nav className="hidden md:flex bg-slate-100 dark:bg-slate-800/50 p-1 rounded-xl gap-1">
                                    <button onClick={()=>setActiveTab('dashboard')} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all font-orbitron ${activeTab==='dashboard'?'bg-indigo-600 text-white shadow-lg':'text-slate-400'}`}>DASHBOARD</button>
                                    <button onClick={()=>setActiveTab('history')} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all font-orbitron ${activeTab==='history'?'bg-indigo-600 text-white shadow-lg':'text-slate-400'}`}>LOGS</button>
                                    {currentUser.role === 'admin' && (
                                        <button onClick={()=>setActiveTab('admin')} className={`px-4 py-2 rounded-lg text-[10px] font-black transition-all font-orbitron ${activeTab==='admin'?'bg-amber-500 text-black shadow-lg':'text-amber-500/50'}`}>COMMAND</button>
                                    )}
                                </nav>

                                <div className="flex items-center gap-2 sm:gap-3">
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all"><Icon name={isDarkMode ? "Sun" : "Moon"} className="text-slate-400" size={18} /></button>
                                    
                                    {/* 登出按鈕 - 始終顯示 */}
                                    <button 
                                        onClick={() => {setCurrentUser(null); setActiveTab('dashboard'); setAuthForm({username:'', password:'', org:''});}} 
                                        className="flex items-center gap-2 px-3 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all border border-red-100 dark:border-red-900/30 sm:border-transparent"
                                    >
                                        <Icon name="LogOut" size={18} />
                                        <div className="text-left hidden sm:block">
                                            <div className="text-[10px] font-bold leading-tight">登出系統</div>
                                            <div className="text-[8px] font-orbitron opacity-70 leading-none">TERMINATE SESSION</div>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* 行動端底部導覽列 */}
                        <div className="md:hidden fixed bottom-0 left-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-around items-center z-50">
                            <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 ${activeTab==='dashboard'?'text-indigo-600':'text-slate-400'}`}>
                                <Icon name="LayoutDashboard" size={20} />
                                <span className="text-[8px] font-black font-orbitron">DASH</span>
                            </button>
                            <button onClick={()=>setActiveTab('history')} className={`flex flex-col items-center gap-1 ${activeTab==='history'?'text-indigo-600':'text-slate-400'}`}>
                                <Icon name="History" size={20} />
                                <span className="text-[8px] font-black font-orbitron">LOGS</span>
                            </button>
                            {currentUser.role === 'admin' && (
                                <button onClick={()=>setActiveTab('admin')} className={`flex flex-col items-center gap-1 ${activeTab==='admin'?'text-amber-500':'text-slate-400'}`}>
                                    <Icon name="Shield" size={20} />
                                    <span className="text-[8px] font-black font-orbitron">CMD</span>
                                </button>
                            )}
                        </div>

                        <main className="max-w-7xl mx-auto px-6 py-10">
                            {activeTab === 'dashboard' && (
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                    <div className="lg:col-span-4">
                                        <div className="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border dark:border-indigo-500/20 shadow-xl sticky top-24">
                                            <h2 className="text-xl font-black mb-6 text-indigo-500 flex items-center gap-2">
                                                <div className="w-1 h-6 bg-indigo-600"></div>
                                                <div>
                                                    <div className="leading-tight">{editingRecord ? '更新數據' : '回報數據'}</div>
                                                    <div className="font-orbitron text-[10px] tracking-widest opacity-60">{editingRecord ? 'UPDATE DATA' : 'REPORT DATA'}</div>
                                                </div>
                                            </h2>
                                            <form onSubmit={handleSubmit} className="space-y-4">
                                                <div className="text-[10px] text-slate-400 mb-1 uppercase tracking-widest font-orbitron">Operator: {editingRecord ? editingRecord.name : currentUser.username}</div>
                                                <textarea name="content" required rows="4" className={inputClass} placeholder="描述任務細節..." value={formData.content} onChange={handleInputChange} />
                                                <input type="datetime-local" name="datetime" required className={yellowInputClass} value={formData.datetime} onChange={handleInputChange} />
                                                <input type="number" name="duration" step="0.5" required placeholder="工時 (HR)" className={yellowInputClass} value={formData.duration} onChange={handleInputChange} />
                                                <button className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/20 flex flex-col items-center">
                                                    <span className="text-base">{editingRecord ? '同步更新' : '提交報告'}</span>
                                                    <span className="font-orbitron text-[9px] opacity-70 tracking-[0.2em]">{editingRecord ? 'SEND REPORT' : 'SEND REPORT'}</span>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-8">
                                        <div className="bg-white dark:bg-slate-900 rounded-[2rem] overflow-hidden shadow-xl border dark:border-slate-800">
                                            <div className="p-6 bg-slate-50 dark:bg-slate-800/50 font-black flex items-center gap-3 border-b dark:border-slate-800">
                                                <Icon name="Trophy" className="text-amber-500" /> 
                                                <div>
                                                    <div className="text-lg leading-tight">戰士排行</div>
                                                    <div className="font-orbitron text-[10px] tracking-widest text-amber-500/70">WARRIOR RANKING</div>
                                                </div>
                                            </div>
                                            <div className="divide-y dark:divide-slate-800">
                                                {leaderboard.map((s, i) => (
                                                    <div key={i} className="p-6 flex justify-between items-center hover:bg-indigo-500/[0.02] transition-colors">
                                                        <div className="flex gap-6 items-center">
                                                            <span className={`text-3xl font-black italic font-orbitron ${i===0?'text-amber-500':i===1?'text-slate-400':i===2?'text-orange-400':'text-slate-700'}`}>#{i+1}</span>
                                                            <div>
                                                                <div className="font-black uppercase text-slate-800 dark:text-slate-100 text-lg">{s.name}</div>
                                                                <div className="text-[10px] font-bold opacity-40 uppercase tracking-widest font-orbitron">{s.org}</div>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-3xl font-black text-indigo-500 leading-none font-orbitron">{s.score}</div>
                                                            <div className="text-[10px] font-mono text-slate-400 mt-1 uppercase">Total {s.totalHours}HR</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {activeTab === 'history' && (
                                <div className="bg-white dark:bg-slate-900 rounded-[2rem] overflow-hidden shadow-xl border dark:border-slate-800">
                                    <div className="p-6 border-b dark:border-slate-800 flex justify-between items-center">
                                        <h3 className="font-black text-xl text-indigo-500 tracking-widest uppercase font-orbitron">MISSION LOGS</h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 dark:bg-slate-950 text-slate-400 text-[10px] font-black uppercase tracking-widest font-orbitron">
                                                <tr>
                                                    <th className="p-6">Time</th>
                                                    <th className="p-6">Warrior</th>
                                                    <th className="p-6">Mission</th>
                                                    <th className="p-6 text-center">Hours</th>
                                                    {currentUser.role === 'admin' && <th className="p-6 text-center">Actions</th>}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y dark:divide-slate-800">
                                                {records.map(r => (
                                                    <tr key={r.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/20 transition-all">
                                                        <td className="p-6 font-mono text-xs opacity-50">{new Date(r.datetime).toLocaleDateString()}</td>
                                                        <td className="p-6">
                                                            <div className="font-black text-sm uppercase">{r.name}</div>
                                                            <div className="text-[9px] opacity-40 uppercase tracking-tighter font-orbitron">{r.org}</div>
                                                        </td>
                                                        <td className="p-6 text-sm opacity-80">{r.content}</td>
                                                        <td className="p-6 text-center">
                                                            <span className="px-3 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-lg text-[10px] font-black font-mono border border-indigo-100 dark:border-indigo-500/20">{r.duration}H</span>
                                                        </td>
                                                        {currentUser.role === 'admin' && (
                                                            <td className="p-6">
                                                                <div className="flex gap-2 justify-center">
                                                                    <button onClick={() => { setEditingRecord(r); setFormData({ content: r.content, datetime: r.datetime, duration: r.duration.toString(), rating: r.rating.toString() }); setActiveTab('dashboard'); }} className="p-2 text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 rounded-lg"><Icon name="Edit3" size={16}/></button>
                                                                    <button onClick={() => setRecords(records.filter(rec => rec.id !== r.id))} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/40 rounded-lg"><Icon name="Trash2" size={16}/></button>
                                                                </div>
                                                            </td>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'admin' && currentUser.role === 'admin' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="bg-white dark:bg-slate-900 rounded-[2rem] overflow-hidden shadow-xl border dark:border-amber-500/30">
                                        <div className="p-6 bg-amber-500 text-black font-black flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <Icon name="ShieldAlert" />
                                                <div>
                                                    <div className="text-lg leading-tight">戰士資格審核</div>
                                                    <div className="font-orbitron text-[10px] tracking-widest opacity-70">PENDING APPROVALS</div>
                                                </div>
                                            </div>
                                            <span className="bg-black text-amber-500 px-3 py-1 rounded-full text-xs font-mono">
                                                {users.filter(u => u.status === 'pending').length} WAITING
                                            </span>
                                        </div>
                                        <div className="divide-y dark:divide-slate-800">
                                            {users.filter(u => u.status === 'pending').length === 0 ? (
                                                <div className="p-10 text-center opacity-40 font-bold uppercase tracking-widest text-sm italic">目前沒有待處理的招募請求</div>
                                            ) : (
                                                users.filter(u => u.status === 'pending').map(u => (
                                                    <div key={u.username} className="p-6 flex justify-between items-center hover:bg-amber-500/[0.03]">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center font-black text-amber-500 uppercase">{u.username[0]}</div>
                                                            <div>
                                                                <div className="font-black text-slate-800 dark:text-white uppercase">{u.username}</div>
                                                                <div className="text-[10px] font-orbitron opacity-50 tracking-widest uppercase">{u.org}</div>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => updateUserStatus(u.username, 'approved')} className="px-4 py-2 bg-green-500 text-white rounded-xl text-[10px] font-black uppercase hover:scale-105 transition-transform shadow-lg shadow-green-500/20">APPROVE</button>
                                                            <button onClick={() => setUsers(users.filter(usr => usr.username !== u.username))} className="px-4 py-2 bg-red-500 text-white rounded-xl text-[10px] font-black uppercase hover:scale-105 transition-transform shadow-lg shadow-red-500/20">REJECT</button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-slate-900 rounded-[2rem] overflow-hidden shadow-xl border dark:border-slate-800">
                                        <div className="p-6 border-b dark:border-slate-800 flex items-center gap-3">
                                            <Icon name="Users" className="text-indigo-500" />
                                            <div>
                                                <div className="text-lg font-black leading-tight">戰士資料庫</div>
                                                <div className="font-orbitron text-[10px] tracking-widest text-indigo-500 opacity-70">WARRIOR DATABASE</div>
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50 dark:bg-slate-950 text-slate-400 text-[10px] font-black uppercase tracking-widest font-orbitron">
                                                    <tr>
                                                        <th className="p-6">ID / Agent Name</th>
                                                        <th className="p-6">Organization</th>
                                                        <th className="p-6">Role</th>
                                                        <th className="p-6">Status</th>
                                                        <th className="p-6 text-center">Control</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y dark:divide-slate-800">
                                                    {users.map(u => (
                                                        <tr key={u.username} className="hover:bg-indigo-500/[0.02]">
                                                            <td className="p-6 font-black uppercase text-sm">{u.username}</td>
                                                            <td className="p-6 text-xs font-mono opacity-60 uppercase">{u.org}</td>
                                                            <td className="p-6">
                                                                <span className={`px-2 py-1 rounded text-[9px] font-black font-orbitron ${u.role === 'admin' ? 'bg-amber-100 text-amber-600' : 'bg-indigo-100 text-indigo-600'}`}>{u.role.toUpperCase()}</span>
                                                            </td>
                                                            <td className="p-6">
                                                                <span className={`w-2 h-2 rounded-full inline-block mr-2 ${u.status === 'approved' ? 'bg-green-500' : 'bg-amber-500 animate-pulse'}`}></span>
                                                                <span className="text-[10px] font-bold opacity-70 uppercase tracking-widest">{u.status}</span>
                                                            </td>
                                                            <td className="p-6 text-center">
                                                                {u.role !== 'admin' && (
                                                                    <button onClick={() => setUsers(users.filter(usr => usr.username !== u.username))} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors">
                                                                        <Icon name="UserX" size={16} />
                                                                    </button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
